runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # Aumenta heap do Node durante o build para evitar OOM no runner do App Hosting
  - variable: NODE_OPTIONS
    value: --max-old-space-size=4096
    availability:
      - BUILD

  # ── Firebase public config (seguro para commitar — exposto no browser bundle) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDX28D_klJKZjNIpyhuDv-869XUCCA4rrA
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: francielly-7b35c.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: francielly-7b35c
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: francielly-7b35c.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "402607750857"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:402607750857:web:38f06cba477cf318369718
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-GM7S2XXBZS
    availability:
      - BUILD
      - RUNTIME

  # ── Analytics (Google Analytics + Meta Pixel) ────────────────────────────────
  - variable: NEXT_PUBLIC_GA_ID
    value: G-GM7S2XXBZS
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_META_PIXEL_ID
    value: "1370527093885024"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_GOOGLE_ADS_ID
    value: AW-18049747314
    availability:
      - BUILD
      - RUNTIME

  # Chave pública Stripe — segura para commitar (exposta no frontend)
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    value: pk_live_51TJxodFPIfHmLw8h0TqX2GBYdv4afq1SZN6QRU8Yrxccozpq8TmEKzlKeTiHzKhucHhYqrAWMRsmw9yeflXnpDon00J32uO0cz
    availability:
      - BUILD
      - RUNTIME

  # ── Segredos via Secret Manager ──────────────────────────────────────────────
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_SERVICE_ACCOUNT_KEY
    secret: GOOGLE_SERVICE_ACCOUNT_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_CALENDAR_ID
    value: masterfranciellycosta@gmail.com
    availability:
      - RUNTIME
  - variable: ADMIN_EMAILS
    value: biogenaturais34@gmail.com,sergiofalcao92@icloud.com
    availability:
      - RUNTIME
  # STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, RESEND_API_KEY
  # continuam configurados diretamente na Firebase Console.

  # ── Sincronização bidirecional Google Calendar (Fase 2) ─────────────────────
  # GOOGLE_CALENDAR_WEBHOOK_SECRET: HMAC para validar push notifications da Google.
  # CRON_SECRET: bearer header para o cron externo que renova o canal automaticamente.
  # Ambos gerados com `openssl rand -hex 32` e adicionados ao Secret Manager.
  - variable: GOOGLE_CALENDAR_WEBHOOK_SECRET
    secret: GOOGLE_CALENDAR_WEBHOOK_SECRET
    availability:
      - RUNTIME
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
